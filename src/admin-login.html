<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Appointment Management System</title>
    <link rel="icon" type="image/x-icon" href="./assets/logo-for-title.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --success-color: #198754;
            --danger-color: #dc3545;
            --dark-color: #212529;
            --light-color: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            margin: 20px;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .login-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .login-body {
            padding: 2rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            border: none;
            border-radius: 10px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: none;
            padding: 1rem;
            font-weight: 500;
        }

        .alert-danger {
            background-color: rgba(220, 53, 69, 0.1);
            color: #721c24;
        }

        .alert-success {
            background-color: rgba(25, 135, 84, 0.1);
            color: #0f5132;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
            }
            
            .login-header {
                padding: 1.5rem;
            }
            
            .login-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container fade-in">
        <div class="login-header">
            <img src="./assets/logo_with_globe.png" alt="Anurag Sharma Logo" style="height: 50px; margin-bottom: 1rem; filter: brightness(0) invert(1);">
            <i class="fas fa-shield-alt fa-2x mb-2"></i>
            <h1>Admin Access</h1>
            <p>Appointment Management System</p>
        </div>
        
        <div class="login-body">
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="adminEmail" placeholder="name@example.com" required>
                    <label for="adminEmail"><i class="fas fa-envelope me-2"></i>Email Address</label>
                </div>
                
                <div class="form-floating">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
                    <label for="adminPassword"><i class="fas fa-lock me-2"></i>Password</label>
                </div>
                
                <div class="remember-me">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label ms-2" for="rememberMe">
                        Remember me for 24 hours
                    </label>
                </div>
                
                <!-- reCAPTCHA Widget -->
                <div class="g-recaptcha" data-sitekey="6LdWcsgsAAAAALCImo9ga4I1LlWhFh1_CxFW3wib" style="margin-bottom: 1.5rem;"></div>
                
                <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                    <span id="loginText">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </span>
                    <span id="loginLoading" style="display: none;">
                        <div class="spinner-border spinner-border-sm loading-spinner" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        Signing In...
                    </span>
                </button>
            </form>
            
            <div class="footer-text">
                <i class="fas fa-lock me-1"></i>
                Secure admin access only
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/config.js"></script>
    <script type="module" src="./js/excel-login-logger.js"></script>
    <script>
        // Session management
        // SESSION_DURATION is now defined in CONFIG.SESSION_CONFIG.REMEMBER_ME_DURATION

        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            checkExistingSession();
            
            // Add event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Add enter key listener
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });

        function checkExistingSession() {
            const sessionData = localStorage.getItem('adminSession');
            
            if (sessionData) {
                try {
                    const session = JSON.parse(sessionData);
                    const currentTime = new Date().getTime();
                    
                    if (currentTime < session.expiryTime) {
                        // Valid session exists, redirect to dashboard
                        showAlert('Session found. Redirecting to dashboard...', 'success');
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1000);
                        return;
                    } else {
                        // Session expired, clear it
                        localStorage.removeItem('adminSession');
                    }
                } catch (error) {
                    console.error('Error parsing session data:', error);
                    localStorage.removeItem('adminSession');
                }
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Clear previous alerts
            clearAlerts();
            
            // Validate reCAPTCHA
            const recaptchaResponse = grecaptcha.getResponse();
            if (!recaptchaResponse) {
                showAlert('Please complete the reCAPTCHA verification.', 'danger');
                return;
            }
            
            // Validate inputs
            if (!email || !password) {
                showAlert('Please fill in all fields.', 'danger');
                return;
            }
            
            // Show loading state
            setLoadingState(true);
            
            try {
                // SECURE LOGIN: Call server-side validation endpoint
                const formData = new URLSearchParams();
                formData.append('action', 'validateLogin');
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData.toString(),
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    }
                });
                
                const result = await response.json();
                
                if (result.authenticated && result.status === 'success') {
                    // Successful login - result.user contains user data WITHOUT password
                    const validAdmin = result.user;
                    const sessionDuration = rememberMe ? CONFIG.SESSION_CONFIG.REMEMBER_ME_DURATION : CONFIG.SESSION_CONFIG.DEFAULT_DURATION;
                    const expiryTime = Date.now() + sessionDuration;
                    
                    const sessionData = {
                        email: validAdmin.email,
                        name: validAdmin.name,
                        role: validAdmin.role,
                        loginTime: Date.now(),
                        expiryTime: expiryTime,
                        rememberMe: rememberMe
                    };
                    
                    // Store session
                    localStorage.setItem('adminSession', JSON.stringify(sessionData));
                    
                    // Update last login in Google Sheets
                    try {
                        const updateFormData = new URLSearchParams();
                        updateFormData.append('action', 'updateUserLastLogin');
                        updateFormData.append('email', email);
                        updateFormData.append('timestamp', Date.now().toString());
                        
                        fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            body: updateFormData.toString(),
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            }
                        }).catch(err => console.error('Failed to update last login:', err));
                    } catch (updateError) {
                        console.error('Error updating last login:', updateError);
                    }
                    
                    // Log the admin login to Login History sheet
                    try {
                        console.log('About to call logAdminLoginToExcel with email:', email);
                        await logUserLoginToExcel(email, `${validAdmin.role} (${validAdmin.name})`);
                        console.log('Admin login logged successfully to Excel');
                    } catch (logError) {
                        console.error('Failed to log admin login to Excel:', logError);
                        // Continue with login even if logging fails
                    }
                    
                    showAlert('Login successful! Redirecting to dashboard...', 'success');
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                    
                } else {
                    // Failed login
                    showAlert(result.message || 'Invalid email or password. Please try again.', 'danger');
                    setLoadingState(false);
                    
                    // Reset reCAPTCHA
                    grecaptcha.reset();
                    
                    // Shake effect for error
                    const container = document.querySelector('.login-container');
                    container.style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(() => {
                        container.style.animation = '';
                    }, 500);
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('An error occurred during login. Please try again.', 'danger');
                setLoadingState(false);
                
                // Reset reCAPTCHA on error
                grecaptcha.reset();
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} fade-in`;
            alertDiv.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} me-2"></i>
                ${message}
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            
            // Auto-hide alert after 5 seconds if it's an error
            if (type === 'danger') {
                setTimeout(() => {
                    if (alertDiv.parentNode) {
                        alertDiv.style.opacity = '0';
                        setTimeout(() => {
                            if (alertDiv.parentNode) {
                                alertDiv.remove();
                            }
                        }, 300);
                    }
                }, 5000);
            }
        }

        function clearAlerts() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        function setLoadingState(loading) {
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginLoading = document.getElementById('loginLoading');
            
            if (loading) {
                loginBtn.disabled = true;
                loginText.style.display = 'none';
                loginLoading.style.display = 'inline-flex';
            } else {
                loginBtn.disabled = false;
                loginText.style.display = 'inline-flex';
                loginLoading.style.display = 'none';
            }
        }

        // Add shake animation for error states
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 20%, 40%, 60%, 80% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
