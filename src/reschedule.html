<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reschedule Session - Geostrategy & Intelligence Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .reschedule-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .existing-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-weight: 600;
            color: #495057;
        }
        .detail-value {
            color: #212529;
            max-width: 60%;
            text-align: right;
        }
        .new-schedule {
            background: #fff;
            border: 2px solid #007bff;
            border-radius: 10px;
            padding: 20px;
        }
        .btn-reschedule {
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-reschedule:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
        }
        .calendar-container {
            max-width: 100%;
        }
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .time-slot {
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-slot:hover {
            background: #e9ecef;
        }
        .time-slot.selected {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container reschedule-container">
        <div class="header-section">
            <h2><i class="fas fa-calendar-alt text-primary"></i> Reschedule Your Session</h2>
            <p class="text-muted">Review your existing booking details and select a new date & time</p>
        </div>

        <!-- Existing Appointment Details -->
        <div class="existing-details">
            <h4 class="mb-3"><i class="fas fa-info-circle text-info"></i> Current Booking Details</h4>
            <div id="appointment-details">
                <!-- Details will be populated by JavaScript -->
            </div>
        </div>

        <!-- New Schedule Selection -->
        <div class="new-schedule">
            <h4 class="mb-3"><i class="fas fa-calendar-plus text-primary"></i> Select New Date & Time</h4>
            
            <div class="row">
                <div class="col-md-6">
                    <label for="new-date" class="form-label">New Date *</label>
                    <input type="date" class="form-control" id="new-date" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Available Time Slots *</label>
                    <div id="time-slots" class="time-slots">
                        <!-- Time slots will be populated based on selected date -->
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <label for="reschedule-reason" class="form-label">Reason for Rescheduling (Optional)</label>
                <textarea class="form-control" id="reschedule-reason" rows="3" 
                          placeholder="Please let us know why you need to reschedule..."></textarea>
            </div>

            <div class="loading">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Submitting reschedule request...</p>
            </div>

            <div class="mt-4 text-center">
                <button type="button" class="btn btn-reschedule text-white" id="submit-reschedule" disabled>
                    <i class="fas fa-paper-plane"></i> Submit Reschedule Request
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script>
        let appointmentData = {};
        let selectedDate = '';
        let selectedTime = '';
        let availableSlots = ['09:00 AM', '10:00 AM', '11:00 AM', '02:00 PM', '03:00 PM', '04:00 PM'];

        // Initialize the reschedule page
        document.addEventListener('DOMContentLoaded', function() {
            extractAppointmentData();
            displayAppointmentDetails();
            setupDateSelection();
            setupSubmitButton();
        });

        // Extract appointment data from URL parameters
        function extractAppointmentData() {
            const urlParams = new URLSearchParams(window.location.search);
            
            appointmentData = {
                sessionId: urlParams.get('sessionId'),
                name: urlParams.get('name'),
                email: urlParams.get('email'),
                phone: urlParams.get('phone'),
                countryCode: urlParams.get('countryCode'),
                organization: urlParams.get('organization'),
                designation: urlParams.get('designation'),
                location: urlParams.get('location'),
                serviceCategory: urlParams.get('serviceCategory'),
                sessionType: urlParams.get('sessionType'),
                selectedDomains: urlParams.get('selectedDomains'),
                selectedRegions: urlParams.get('selectedRegions'),
                topic: urlParams.get('topic'),
                currentDate: urlParams.get('currentDate'),
                currentTime: urlParams.get('currentTime')
            };

            console.log('Extracted appointment data:', appointmentData);
        }

        // Display existing appointment details
        function displayAppointmentDetails() {
            const detailsContainer = document.getElementById('appointment-details');
            
            const details = [
                { label: 'Session ID', value: appointmentData.sessionId },
                { label: 'Name', value: appointmentData.name },
                { label: 'Email', value: appointmentData.email },
                { label: 'Phone', value: `${appointmentData.countryCode} ${appointmentData.phone}` },
                { label: 'Organization', value: appointmentData.organization },
                { label: 'Designation', value: appointmentData.designation },
                { label: 'Region', value: formatLocation(appointmentData.location) },
                { label: 'Service Category', value: formatServiceCategory(appointmentData.serviceCategory) },
                { label: 'Session Type', value: formatSessionType(appointmentData.sessionType) },
                { label: 'Domains', value: appointmentData.selectedDomains },
                { label: 'Regions of Interest', value: appointmentData.selectedRegions },
                { label: 'Topic', value: appointmentData.topic },
                { label: 'Current Scheduled Date', value: appointmentData.currentDate || 'Not specified' },
                { label: 'Current Scheduled Time', value: appointmentData.currentTime || 'Not specified' }
            ];

            detailsContainer.innerHTML = details.map(detail => 
                detail.value ? `
                    <div class="detail-row">
                        <span class="detail-label">${detail.label}:</span>
                        <span class="detail-value">${detail.value}</span>
                    </div>
                ` : ''
            ).join('');
        }

        // Format helper functions
        function formatLocation(location) {
            const locationMap = {
                'middle-east': 'Middle East / West Asia',
                'europe': 'Europe',
                'us': 'United States',
                'india': 'India',
                'japan': 'Japan',
                'others': 'Others'
            };
            return locationMap[location] || location;
        }

        function formatServiceCategory(category) {
            return category ? category.charAt(0).toUpperCase() + category.slice(1) : category;
        }

        function formatSessionType(type) {
            const typeMap = {
                'generalized': 'Generalized',
                'specialized': 'Specialized (Virtual)',
                'super-specialized': 'Super-Specialized (In-Person)',
                'long-term-engagement': 'Long-term Projects',
                'advisory-service': 'Advisory'
            };
            return typeMap[type] || type;
        }

        // Setup date selection functionality
        function setupDateSelection() {
            const dateInput = document.getElementById('new-date');
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            
            // Set minimum date to tomorrow
            dateInput.min = tomorrow.toISOString().split('T')[0];
            
            dateInput.addEventListener('change', function() {
                selectedDate = this.value;
                loadTimeSlots();
                checkFormCompletion();
            });
        }

        // Load available time slots for selected date
        function loadTimeSlots() {
            const timeSlotsContainer = document.getElementById('time-slots');
            
            timeSlotsContainer.innerHTML = availableSlots.map(slot => `
                <div class="time-slot" data-time="${slot}">
                    ${slot}
                </div>
            `).join('');

            // Add click handlers to time slots
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.addEventListener('click', function() {
                    // Remove previous selection
                    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                    
                    // Select current slot
                    this.classList.add('selected');
                    selectedTime = this.dataset.time;
                    
                    checkFormCompletion();
                });
            });
        }

        // Check if form is complete to enable submit button
        function checkFormCompletion() {
            const submitBtn = document.getElementById('submit-reschedule');
            
            if (selectedDate && selectedTime) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        // Setup submit button functionality
        function setupSubmitButton() {
            const submitBtn = document.getElementById('submit-reschedule');
            
            submitBtn.addEventListener('click', function() {
                submitRescheduleRequest();
            });
        }

        // Submit reschedule request
        async function submitRescheduleRequest() {
            const loadingDiv = document.querySelector('.loading');
            const submitBtn = document.getElementById('submit-reschedule');
            const reason = document.getElementById('reschedule-reason').value;

            // Show loading
            loadingDiv.style.display = 'block';
            submitBtn.disabled = true;

            const rescheduleData = {
                ...appointmentData,
                newDate: selectedDate,
                newTime: selectedTime,
                rescheduleReason: reason,
                action: 'client-reschedule'
            };

            try {
                const response = await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(rescheduleData)
                });

                // Show success message
                showSuccessMessage();

            } catch (error) {
                console.error('Error submitting reschedule request:', error);
                showErrorMessage();
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // Show success message
        function showSuccessMessage() {
            const container = document.querySelector('.reschedule-container');
            container.innerHTML = `
                <div class="text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="text-success">Reschedule Request Submitted!</h3>
                    <p class="text-muted mb-4">
                        Your reschedule request has been sent successfully. You will receive a confirmation email shortly.
                    </p>
                    <div class="alert alert-info">
                        <h5>Next Steps:</h5>
                        <ul class="list-unstyled mb-0">
                            <li>• We will review your request within 24 hours</li>
                            <li>• You will receive an email confirmation</li>
                            <li>• If approved, a new calendar invite will be sent</li>
                        </ul>
                    </div>
                    <a href="/" class="btn btn-primary mt-3">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                </div>
            `;
        }

        // Show error message
        function showErrorMessage() {
            const container = document.querySelector('.new-schedule');
            container.innerHTML = `
                <div class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h5>Request Failed</h5>
                    <p>There was an error submitting your reschedule request. Please try again or contact support.</p>
                    <button class="btn btn-outline-danger" onclick="location.reload()">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
