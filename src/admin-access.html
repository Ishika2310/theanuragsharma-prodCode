<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Anurag Sharma</title>
    <link rel="icon" type="image/x-icon" href="/assets/logo-for-title.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-access-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 1rem;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #0056b3;
            color: white;
            text-decoration: none;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="admin-access-card">
        <img src="./assets/logo_with_globe.png" alt="Anurag Sharma Logo" class="logo">
        <h1>Admin Access</h1>
        <p>Access the appointment management dashboard to manage consultation bookings.</p>
        
        <a href="admin-login.html" class="btn">
            <i>🔐</i> Access Dashboard
        </a>
        
        <div class="warning">
            <strong>⚠️ Authorized Access Only</strong><br>
            This area is restricted to authorized personnel only. Unauthorized access is prohibited.
        </div>
    </div>
</body>
</html>
